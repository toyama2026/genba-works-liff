<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場WORKS 監督ダッシュボード</title>
<style>
:root{--line:#06c755;--ink:#14181b;--sub:#6b7280;--bg:#eef1f4;--card:#fff;--bd:#e6eaee;--warn:#e8453c;--warnbg:#fdecea;--amber:#b45309;--amberbg:#fff7e6;--ok:#0a8f4f;--okbg:#e7f8ef;--blue:#185fa5}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;background:var(--bg);color:var(--ink)}
.top{background:#fff;border-bottom:1px solid var(--bd);padding:14px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5}
.lg{width:30px;height:30px;border-radius:9px;background:var(--line);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}
.top b{font-size:16px}.top .upd{margin-left:auto;font-size:12px;color:var(--sub)}
.refresh{border:1px solid var(--bd);background:#fff;border-radius:9px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.wrap{max-width:1100px;margin:0 auto;padding:20px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:16px}
.stat .l{font-size:12.5px;color:var(--sub);font-weight:600}.stat .n{font-size:34px;font-weight:800;margin-top:6px;line-height:1}.stat .n small{font-size:15px;color:var(--sub);font-weight:700;margin-left:3px}
.stat.warn{border-color:#f3c3bf;background:var(--warnbg)}.stat.warn .n{color:var(--warn)}
.stat.amber{border-color:#f5d98a;background:#fffbeb}.stat.amber .n{color:var(--amber)}
.grid{display:grid;grid-template-columns:1fr 1.2fr;gap:18px}
.panel{background:#fff;border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.panel .ph{padding:14px 18px;border-bottom:1px solid var(--bd);font-weight:800;font-size:14px}
.panel .pc{padding:8px 18px 16px}
.sgrp{padding:12px 0;border-bottom:1px solid #f0f2f4}.sgrp:last-child{border:0}
.sn{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.wkr{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13.5px}
.av{width:30px;height:30px;border-radius:50%;background:#dfe6ec;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#5b6770;flex:0 0 auto}
.tm{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--sub);font-size:12.5px;text-align:right}
.rep{padding:13px 0;border-bottom:1px solid #f0f2f4}.rep:last-child{border:0}
.rep .h{display:flex;align-items:center;gap:8px;margin-bottom:6px}.rep .nm{font-weight:800;font-size:13.5px}.rep .si{color:var(--sub);font-size:12px}
.rep .sum{font-size:13px;line-height:1.6;background:#f7f9fb;border:1px solid #eef1f4;border-radius:10px;padding:9px 11px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:#eef1f4;color:#475059}
.tag.warn{background:var(--warnbg);color:var(--warn)}.tag.amber{background:#fff7e6;color:var(--amber)}
.empty{color:var(--sub);font-size:13px;text-align:center;padding:22px}
.mini{border:0;background:#11181c;color:#fff;font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer}
@media(max-width:820px){.grid{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="top"><div class="lg">現</div><b>現場WORKS 監督ダッシュボード</b><span class="upd" id="upd">…</span><a class="refresh" href="admin.html" style="text-decoration:none;color:var(--ink)">⚙ 管理</a><button class="refresh" onclick="exportCsv()">⤓ 出面CSV</button><button class="refresh" onclick="load()">↻ 更新</button></div>
<div class="wrap">
  <div class="cards">
    <div class="stat"><div class="l">在場中の職人</div><div class="n"><span id="s-present">–</span><small>名</small></div></div>
    <div class="stat"><div class="l">稼働現場</div><div class="n"><span id="s-sites">–</span><small>現場</small></div></div>
    <div class="stat warn"><div class="l">未退場</div><div class="n"><span id="s-unclosed">–</span><small>件</small></div></div>
    <div class="stat amber"><div class="l">要対応の日報</div><div class="n"><span id="s-risk">–</span><small>件</small></div></div>
  </div>
  <div class="grid">
    <div class="panel"><div class="ph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M4 21V5l8-3v19"/><path d="M12 8l8 3v10"/><path d="M4 21h17M8 7v.01M8 11v.01M8 15v.01"/></svg>在場状況</div><div class="pc" id="bysite"><div class="empty">読込中…</div></div>
      <div class="ph" style="border-top:1px solid var(--bd)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2M9 2h6"/></svg>未退場</div><div class="pc" id="unclosed"><div class="empty">–</div></div>
      <div class="ph" style="border-top:1px solid var(--bd)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>手動打刻の承認</div><div class="pc" id="pending"><div class="empty">–</div></div>
    </div>
    <div class="panel"><div class="ph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h4"/></svg>日報・AI要約</div><div class="pc" id="reports"><div class="empty">読込中…</div></div></div>
  </div>
  <div class="panel" style="margin-top:18px"><div class="ph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>今後の予定（7日間）</div><div class="pc" id="sched"><div class="empty">読込中…</div></div></div>
  <div class="panel" style="margin-top:18px">
    <div class="ph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>現場チャット
      <select id="chatSiteSel" onchange="chatSwitch()" style="margin-left:10px;padding:6px 10px;border:1px solid var(--bd);border-radius:8px;font:inherit;font-size:13px"></select>
    </div>
    <div class="pc">
      <div id="dchatBox" style="min-height:200px;max-height:360px;overflow:auto;display:flex;flex-direction:column;gap:8px;padding:6px 0"><div class="empty">現場を選んでください</div></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input id="dchatInput" placeholder="監督としてメッセージを送信" style="flex:1;padding:11px;border:1px solid var(--bd);border-radius:9px;font:inherit;font-size:14px" onkeydown="if(event.key==='Enter')dsend()">
        <button class="refresh" onclick="dsend()" style="background:#06c755;color:#fff;border-color:#06c755">送信</button>
      </div>
    </div>
  </div>
</div>
<script>
var BASE="https://cdrobplodkxyagzyzvpq.supabase.co/functions/v1";
var ANON="sb_publishable_cEnH7Mug8B7O8JtgSIauMw_MjlVxhW5";
function getKey(){ var k=localStorage.getItem("genba_dash_key"); if(!k){ k=prompt("監督パスコードを入力してください"); if(k) localStorage.setItem("genba_dash_key",k); } return k; }
function av(n){ return (n||"?").trim().charAt(0); }
function fmtT(iso){ if(!iso) return "–"; return new Date(iso).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}); }
function el(id){ return document.getElementById(id); }
async function exportCsv(){
  var key=getKey(); if(!key) return;
  var ym=new Date().toISOString().slice(0,7);
  try{
    var r=await fetch(BASE+"/genba-export?ym="+ym,{headers:{"apikey":ANON,"Authorization":"Bearer "+ANON,"x-dash-key":key}});
    if(!r.ok){ alert("CSV取得に失敗しました"); return; }
    var blob=await r.blob();
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="genba-demen-"+ym+".csv";a.click();URL.revokeObjectURL(a.href);
  }catch(e){ alert("エラー: "+(e.message||e)); }
}
async function act(params){
  var key=getKey(); if(!key) return;
  try{
    var r=await fetch(BASE+"/genba-action",{method:"POST",headers:{"apikey":ANON,"Authorization":"Bearer "+ANON,"x-dash-key":key,"Content-Type":"application/json"},body:JSON.stringify(params)});
    var j=await r.json();
    if(!j.ok){ alert("失敗: "+(j.error||"")); return; }
    load();
  }catch(e){ alert("エラー: "+(e.message||e)); }
}
async function load(){
  var key=getKey(); if(!key) return;
  try{
    var r=await fetch(BASE+"/genba-dash",{headers:{"apikey":ANON,"Authorization":"Bearer "+ANON,"x-dash-key":key}});
    if(r.status===401){ localStorage.removeItem("genba_dash_key"); alert("パスコードが違います"); return; }
    var j=await r.json(); if(!j.ok) throw new Error(j.error||"error");
    el("s-present").textContent=j.summary.present; el("s-sites").textContent=j.summary.sites_active;
    el("s-unclosed").textContent=j.summary.unclosed; el("s-risk").textContent=j.summary.risk;
    el("upd").textContent="更新 "+new Date(j.generated_at).toLocaleTimeString("ja-JP");
    // bysite
    var h="";
    if(!j.bysite.length) h='<div class="empty">在場中の職人はいません</div>';
    for(var i=0;i<j.bysite.length;i++){var s=j.bysite[i];
      h+='<div class="sgrp"><div class="sn"><span class="dot" style="background:#06c755"></span>'+s.site+'</div>';
      for(var k=0;k<s.workers.length;k++){var w=s.workers[k];
        h+='<div class="wkr"><span class="av">'+av(w.name)+'</span>'+w.name+'<span style="color:#6b7280;font-size:12px">'+(w.trade||'')+'</span><span class="tm">'+fmtT(w.first_in)+'〜 '+Math.floor(w.elapsed_min/60)+'h'+(w.elapsed_min%60)+'m</span></div>';
      } h+='</div>';
    }
    el("bysite").innerHTML=h;
    // unclosed
    var u="";
    if(!j.unclosed.length) u='<div class="empty">未退場はありません</div>';
    for(var i=0;i<j.unclosed.length;i++){var x=j.unclosed[i];
      u+='<div class="wkr"><span class="av">'+av(x.name)+'</span>'+x.name+'<span style="color:#6b7280;font-size:12px">'+x.site+'</span><span class="tm" style="color:#e8453c">'+x.work_date+' '+fmtT(x.first_in)+'〜 未退場</span><button class="mini" style="margin-left:10px" onclick=\'act({action:"fix_out",worker_id:"'+x.worker_id+'",site_id:"'+x.site_id+'",work_date:"'+x.work_date+'"})\'>退場補正</button></div>';
    }
    el("unclosed").innerHTML=u;
    // pending manual
    var pm="";
    var P=j.pending_manual||[];
    if(!P.length) pm='<div class="empty">承認待ちはありません</div>';
    for(var i=0;i<P.length;i++){var m=P[i];
      pm+='<div class="wkr"><span class="av">'+av(m.name)+'</span>'+m.name+'<span style="color:#6b7280;font-size:12px">'+m.site+'・'+(m.type==='in'?'入場':'退場')+'</span><span class="tm">'+fmtT(m.occurred_at)+'</span><button class="mini" style="margin-left:10px;background:#06c755" onclick=\'act({action:"approve_manual",id:"'+m.id+'"})\'>承認</button></div>';
    }
    el("pending").innerHTML=pm;
    // reports
    var rp="";
    if(!j.reports.length) rp='<div class="empty">日報はまだありません</div>';
    for(var i=0;i<j.reports.length;i++){var d=j.reports[i];
      var tags=(d.ai_tags||[]).map(function(t){var c=(t==='安全'?'warn':(t==='不具合'||t==='資材不足'||t==='追加要望'?'amber':''));return '<span class="tag '+c+'">'+t+'</span>';}).join('');
      var ph=(d.photos||[]).map(function(u){return '<img src="'+u+'" style="width:62px;height:62px;object-fit:cover;border-radius:8px;border:1px solid var(--bd)">';}).join('');
      var actBtn=(d.status==='approved')?'<span style="margin-left:auto;font-size:11.5px;font-weight:800;color:var(--ok)">✓ 承認済</span>':'<button class="mini" style="margin-left:auto;background:#06c755" onclick=\'act({action:"approve_report",worker_id:"'+d.worker_id+'",site_id:"'+d.site_id+'",report_date:"'+d.date+'"})\'>承認</button>';
      rp+='<div class="rep"><div class="h"><span class="nm">'+d.name+'</span><span class="si">／'+d.site+'</span><span style="margin-left:auto;color:#6b7280;font-size:12px">'+d.date+'</span></div><div class="sum">'+(d.ai_summary||d.body||'(本文なし)')+'</div>'+(ph?'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+ph+'</div>':'')+'<div class="tags" style="align-items:center">'+tags+actBtn+'</div></div>';
    }
    el("reports").innerHTML=rp;
    var sel=el("chatSiteSel");
    if(sel.options.length===0 && j.sites && j.sites.length){ j.sites.forEach(function(s){var o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);}); chatSwitch(); }
    schedLoad();
  }catch(e){ el("upd").textContent="エラー: "+(e.message||e); }
}
async function schedLoad(){
  try{
    var r=await fetch(BASE+"/genba-schedule",{method:"POST",headers:{"apikey":ANON,"Authorization":"Bearer "+ANON,"x-dash-key":getKey(),"Content-Type":"application/json"},body:JSON.stringify({mode:"list_range",key:getKey()})});
    var j=await r.json(); var box=el("sched");
    if(!j.ok){box.innerHTML='<div class="empty">取得できません</div>';return;}
    if(!j.schedules||!j.schedules.length){box.innerHTML='<div class="empty">予定はありません</div>';return;}
    var h='';
    j.schedules.forEach(function(s){
      var chips=s.days.map(function(d){var dec=d.status==='declined';return '<span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:'+(dec?'#fdecea':'#e7f8ef')+';color:'+(dec?'#cf3a31':'#0a8f4f')+'">'+parseInt(d.date.slice(5,7))+'/'+parseInt(d.date.slice(8,10))+(dec?' 欠':'')+'</span>';}).join(' ');
      h+='<div class="sgrp" style="padding:10px 0"><div class="sn">'+s.site+' <span style="color:#6b7280;font-weight:600;font-size:12px">'+s.company_name+(s.trade?(' / '+s.trade):'')+(s.headcount?(' / '+s.headcount+'名'):'')+'</span></div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">'+chips+'</div></div>';
    });
    box.innerHTML=h;
  }catch(e){}
}
var dchatSince=null, dchatTimer=null;
function curSite(){var s=el("chatSiteSel");return s&&s.value?s.value:null;}
function chatSwitch(){ dchatSince=null; el("dchatBox").innerHTML='<div class="empty">読込中…</div>'; dchatLoad(); if(dchatTimer)clearInterval(dchatTimer); dchatTimer=setInterval(dchatLoad,6000); }
function escc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function dchatLoad(){
  var site=curSite(); if(!site)return;
  try{
    var body={mode:'list',key:getKey(),site_id:site}; if(dchatSince)body.since=dchatSince;
    var r=await fetch(BASE+"/genba-chat",{method:"POST",headers:{"apikey":ANON,"Authorization":"Bearer "+ANON,"x-dash-key":getKey(),"Content-Type":"application/json"},body:JSON.stringify(body)});
    var j=await r.json(); if(!j.ok)return;
    var box=el("dchatBox");
    if(!dchatSince){ box.innerHTML=''; if(!j.messages.length) box.innerHTML='<div class="empty">まだメッセージはありません</div>'; }
    if(j.messages.length){ if(box.querySelector('.empty'))box.innerHTML='';
      j.messages.forEach(function(m){
        var mine=(m.sender_role==='kantoku'); var t=new Date(m.created_at).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}); var d=document.createElement('div');
        if(mine){ d.style.cssText='align-self:flex-end;max-width:75%'; d.innerHTML='<div style="background:#06c755;color:#fff;padding:8px 11px;border-radius:12px 12px 2px 12px;font-size:13.5px;white-space:pre-wrap;word-break:break-word">'+escc(m.body)+'</div><div style="text-align:right;font-size:9.5px;color:#9aa4ad">'+t+'</div>'; }
        else{ d.style.cssText='align-self:flex-start;max-width:78%'; d.innerHTML='<div style="font-size:10.5px;color:#6b7280;margin:0 0 2px 3px;font-weight:600">'+escc(m.sender_name||'職人')+'</div><div style="background:#fff;border:1px solid var(--bd);padding:8px 11px;border-radius:2px 12px 12px 12px;font-size:13.5px;white-space:pre-wrap;word-break:break-word">'+escc(m.body)+'</div><div style="font-size:9.5px;color:#9aa4ad;margin-left:3px">'+t+'</div>'; }
        box.appendChild(d);
      });
      dchatSince=j.messages[j.messages.length-1].created_at; box.scrollTop=box.scrollHeight;
    }
  }catch(e){}
}
async function dsend(){
  var site=curSite(); if(!site){alert("現場を選んでください");return;}
  var inp=el("dchatInput"); var v=inp.value.trim(); if(!v)return; inp.value='';
  try{ await fetch(BASE+"/genba-chat",{method:"POST",headers:{"apikey":ANON,"Authorization":"Bearer "+ANON,"x-dash-key":getKey(),"Content-Type":"application/json"},body:JSON.stringify({mode:'send',key:getKey(),site_id:site,body:v,sender_name:'監督'})}); dchatLoad(); }catch(e){ inp.value=v; }
}
load();
setInterval(load, 30000);
</script>
</body>
</html>
